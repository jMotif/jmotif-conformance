name: conformance

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  cross-lang:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout conformance
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for Rcpp
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Clone implementations
        run: |
          git clone https://github.com/jMotif/SAX.git ../SAX
          git clone https://github.com/jMotif/GI.git ../GI
          git clone https://github.com/jMotif/sax-vsm_classic.git ../sax-vsm_classic
          git clone https://github.com/GrammarViz2/grammarviz2_src.git ../grammarviz2_src
          git clone https://github.com/jMotif/jmotif-R.git ../jmotif-R
          git clone https://github.com/seninp/saxpy.git ../saxpy

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Run conformance suite
        run: ./scripts/run_all.sh
